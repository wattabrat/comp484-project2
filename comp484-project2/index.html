<!DOCTYPE html>
<html>
  <head>
    <title>Your Giga Pet</title>
    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <!-- Three.js import -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
  </head>

 <body class="page">

  <h1>This is your Giga Pet</h1>

  <div class="layout">

    <!-- LEFT (3D MODEL) -->
    <div class="canvas-box">
      <div id="pet-canvas-container"></div>
      <span class="zzz"></span>
    </div>

    <!-- RIGHT (DASHBOARD) -->
    <div class="dashboard">

      <div class="pet-name">
        <span class="name">Pikachu</span>
        <span class="status-badge">Awake  ˗ˋˏ ♡ ˎˊ˗</span>
      </div>

      <div class="stats">

        <div class="stat-row">
          <span>Happiness</span>
          <div class="stat-bar-bg">
            <div class="stat-bar bar-happy"></div>
          </div>
          <span class="happiness">0</span>
        </div>

        <div class="stat-row">
          <span>Weight</span>
          <div class="stat-bar-bg">
            <div class="stat-bar bar-weight"></div>
          </div>
          <span class="weight">0</span>
        </div>

      </div>

      <div id="message" class="message-box">
        pika - pika! (˶>⩊<˶)
      </div>

      <div class="buttons">
        
        <button class="btn btn-treat treat-button">Treat</button>
        <button class="btn btn-play play-button">Play</button>
        <button class="btn btn-exercise exercise-button">Exercise</button>
        <button class="btn btn-sleep sleep-button">Sleep</button>
      </div>

    </div>
  </div>

    <!-- jQuery for DOM manipulation -->
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
  </body>
</html>
